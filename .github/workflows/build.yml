name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:  # 也支持手动触发

jobs:
  # ============================================================
  # Job 1: 构建 macOS DMG (arm64 Apple Silicon)
  # ============================================================
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        working-directory: 03_desktop_app
        run: npm install

      - name: 给二进制文件添加执行权限
        run: |
          chmod +x 03_desktop_app/bin/darwin/mihomo_aarch64
          chmod +x 03_desktop_app/bin/darwin/mihomo_x86_64
          chmod +x 03_desktop_app/bin/darwin/axel

      - name: 依据 Git Tag 同步 package.json 版本号
        working-directory: 03_desktop_app
        run: node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); const tag = process.env.GITHUB_REF_NAME; if (tag && tag.startsWith('v')) { pkg.version = tag.replace(/^v/, ''); fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)); console.log('Updated package.json version to:', pkg.version); }"

      - name: 打包 macOS DMG
        working-directory: 03_desktop_app
        run: npm run dist
        env:
          # 跳过代码签名（无开发者证书时）
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 上传 Mac 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: |
            03_desktop_app/dist/*.dmg
            03_desktop_app/dist/*.zip

  # ============================================================
  # Job 2: 构建 Windows EXE (x64)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 下载 axel.exe + cygwin1.dll (from nishad/axel-for-windows)
        shell: pwsh
        run: |
          $dest = "03_desktop_app\bin\win32"
          New-Item -ItemType Directory -Force -Path $dest

          $baseUrl = "https://raw.githubusercontent.com/nishad/axel-for-windows/master"

          Write-Host "下载 axel.exe..."
          Invoke-WebRequest -Uri "$baseUrl/axel.exe" -OutFile "$dest\axel.exe"

          Write-Host "下载 cygwin1.dll..."
          Invoke-WebRequest -Uri "$baseUrl/cygwin1.dll" -OutFile "$dest\cygwin1.dll"

          Write-Host "完成，bin/win32 目录内容："
          Get-ChildItem "$dest"

      - name: 安装 npm 依赖
        working-directory: 03_desktop_app
        run: npm install

      - name: 依据 Git Tag 同步 package.json 版本号
        working-directory: 03_desktop_app
        run: node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); const tag = process.env.GITHUB_REF_NAME; if (tag && tag.startsWith('v')) { pkg.version = tag.replace(/^v/, ''); fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)); console.log('Updated package.json version to:', pkg.version); }"

      - name: 打包 Windows EXE
        working-directory: 03_desktop_app
        run: npm run dist -- --win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 上传 EXE 产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: 03_desktop_app/dist/*.exe

  # ============================================================
  # Job 3: 发布到 GitHub Releases (仅推 tag 时执行)
  # ============================================================
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: 下载 Mac 产物
        uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: ./release-files

      - name: 下载 Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./release-files

      - name: 查看产物
        run: ls -lh ./release-files/

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          name: "生信原始数据下载器 ${{ github.ref_name }}"
          body: |
            ## 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🍎 macOS (M1/M2/M3/M4) | `*-arm64.dmg` | 安装版 (双击打开后拖拽安装) |
            | 🍎 macOS (M1/M2/M3/M4) | `*-mac.zip` | 绿色免安装版 (解压直接运行) |
            | 🪟 Windows 64位 | `Setup*.exe` | 安装版 (双击运行引导安装) |
            | 🪟 Windows 64位 | `BioDownloader*.exe` | 绿色免安装版 (单文件免安装直接运行) |

            ## 安装与运行步骤
            - **Mac 免安装运行 (推荐)**: 下载 `*-mac.zip` → 解压得到 `BioDownloader.app` → 拖到任意目录即可运行。
            - **Mac 安装版**: 下载 DMG → 双击打开 → 将 App 拖入 Applications 文件夹。
            - **Windows 免安装运行**: 下载 `BioDownloader*.exe` 单文件版 → 直接双击即可启动运行。
            - **Windows 安装版**: 下载 `Setup*.exe` → 双击安装引导流程。

            ---

            ## 🍎 Mac 提示“已损坏，打不开”解决办法
            由于本软件为独立开发，没有购买 Apple 昂贵的官方签名证书，在新版 macOS 下下载运行会提示“已损坏，打不开”。
            这是苹果官方 Gatekeeper 安全拦截导致的（属于正常安全控制），只需运行以下命令即可恢复正常：

            1. 打开系统自带的 **终端 (Terminal)** 软件
            2. 复制并执行以下命令（输入电脑开机密码即可）：
               ```bash
               sudo xattr -cr /Applications/BioDownloader.app
               ```
               *(如果您直接运行解压出的免安装版，请将路径改为您的 `BioDownloader.app` 实际路径：`sudo xattr -cr [文件路径]`)*

            ---

            ## 首次使用
            1. 打开软件，进入「账户充值」页面注册并登录您的账户。
            2. 在「下载中心」选择您的数据类型（SRA/EBI/GEO），输入对应编号或链接即可启动高速加速下载。
          files: ./release-files/*
          draft: false
          prerelease: false
